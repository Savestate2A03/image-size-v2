name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org/'  # ← public npm, not GitHub

      - run: yarn install --immutable

      - run: yarn publish --access public  # ← required for scoped packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}  # ← npm token, not GITHUB_TOKEN
